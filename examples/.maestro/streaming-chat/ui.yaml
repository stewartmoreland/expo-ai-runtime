appId: com.stewmore.expoai.streamingchat
name: streaming-chat / UI (offline)
tags:
  - offline
---
- launchApp:
    clearState: true
- assertVisible:
    id: "title-streaming-chat"
- assertVisible:
    id: "card-prompt"
- tapOn:
    id: "prompt-input"
- inputText: "Hello from Maestro"
- hideKeyboard
# Before streaming, the button reads "Stream" (id button-stream).
- assertVisible:
    id: "button-stream"
