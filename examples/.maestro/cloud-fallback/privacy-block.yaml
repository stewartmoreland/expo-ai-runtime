appId: com.stewmore.expoai.cloudfallback
name: cloud-fallback / Sensitive + fallback=none is blocked, no leak (offline)
tags:
  - offline
# PRECONDITION: device has no on-device model. With sensitive=ON and
# fallback=none, generation must be BLOCKED (UNAVAILABLE), never silently sent.
# No server is contacted in this flow. Do not run on a device that HAS an
# on-device model (it would generate on-device and this assertion would fail).
---
- launchApp:
    clearState: true
- assertVisible:
    id: 'title-cloud-fallback'
# Defaults already satisfy the scenario (sensitive ON, fallback "none"), but
# set them explicitly so the flow is self-contained and order-independent.
- assertVisible:
    id: 'switch-sensitive'
    checked: true
- tapOn:
    id: 'chip-none'
- tapOn:
    id: 'button-generate'
# Blocked path: error.code === "UNAVAILABLE" => card title "Blocked (no leak)"
# and a badge whose label is the code "UNAVAILABLE".
- extendedWaitUntil:
    visible:
      id: 'badge-unavailable'
    timeout: 30000
# Assert the human-readable card title "Blocked (no leak)". Patterns are wrapped
# in .* because this Maestro/iOS build matches text (accessibilityText) as a
# FULL-string regex; .* both anchors around the title and sidesteps the literal
# parens. Scroll it into view in case the blocked card renders below the fold.
- scrollUntilVisible:
    element:
      text: '.*Blocked.*'
    direction: DOWN
    timeout: 30000
    visibilityPercentage: 30
- assertVisible: '.*no leak.*'
# Nothing was sent to cloud, so no third-party badge appears.
- assertNotVisible:
    id: 'badge-third-party-cloud'
