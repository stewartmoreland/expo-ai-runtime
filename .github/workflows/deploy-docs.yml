name: Deploy docs

on:
  push:
    branches: [main]
    paths: [website/**, .github/workflows/deploy-docs.yml]
  workflow_dispatch: # manual "Run workflow" button

# Allow the deploy job to publish to Pages; id-token is required by deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time; don't cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    working-directory: website # standalone package — own lockfile, outside the root workspaces

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci
      - run: npm run build # fails on broken internal links
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
