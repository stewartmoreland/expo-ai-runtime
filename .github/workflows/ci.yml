name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: # manual "Run release" button — covers pushes that don't fire the push trigger

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # push the release commit + tag, create the GitHub release
  id-token: write # required for npm Trusted Publisher (OIDC) publishing + provenance

jobs:
  js-layer:
    name: JS — lint, typecheck, build, test + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build # build first so cross-package type declarations exist for typecheck
      - run: npm run typecheck
      - run: npm run test:coverage
      # Coverage is informational only — never blocks the build (see codecov.yml).
      - name: Upload coverage to Codecov
        if: always()
        continue-on-error: true
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }} # optional for public repos; set if private
          files: packages/expo-ai-core/coverage/lcov.info,packages/expo-ai-cloud/coverage/lcov.info,packages/expo-ai-evals/coverage/lcov.info,packages/expo-ai-react/coverage/lcov.info
          fail_ci_if_error: false

  api-surface:
    name: API surface & package contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build # api-extractor + publint/attw consume the emitted build/ output
      # Fails if the committed API report (etc/*.api.md) drifts from the public
      # .d.ts — forces a conscious, semver-aware change. Regenerate with
      # `npm run api:update` and commit the report.
      - name: Check public API surface (api-extractor)
        run: npm run api:check
      # publint + are-the-types-wrong (esm-only profile) on each published package.
      - name: Lint package publishing (publint + attw)
        run: npm run pkg:lint

  release:
    name: Release & publish to npm
    needs: [js-layer, api-surface]
    # On a merge/push to main, or a manual dispatch — never on PRs. The verify gate must pass first.
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the release commit + tag, create the GitHub release
      id-token: write # mint the OIDC token for npm Trusted Publisher publishing
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main # check out the branch (not a detached SHA) so the release commit can push back
          fetch-depth: 0 # release-it needs full history + tags to compute the bump
          fetch-tags: true
          # main is protected by a ruleset; the default GITHUB_TOKEN can't be granted
          # bypass on a personal repo. Push with a PAT owned by a repo admin, who is a
          # bypass actor on the ruleset, so the release commit/tag can land on main.
          token: ${{ secrets.RELEASE_TOKEN }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24 # >= 22.14.0 required for npm Trusted Publisher OIDC
          cache: npm
          registry-url: https://registry.npmjs.org # registry config for the OIDC publish (no token needed)
      - run: npm install -g npm@latest # npm >= 11.5.1 required for OIDC trusted publishing
      - run: npm ci
      - run: npm run build # build/ ships in each package (see "files" in package.json)
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Decide whether a release is needed
        id: decide
        # Release only when there are user-facing changes (feat/fix/perf or a
        # breaking change) since the last v* tag. chore/ci/docs/build/style/test/
        # refactor commits don't cut a new npm version. release-it computes the
        # actual bump (fix->patch, feat->minor, !/BREAKING->major) when it runs.
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then RANGE="${LAST_TAG}..HEAD"; else RANGE="HEAD"; fi
          if git log "$RANGE" --format='%s%n%b' | grep -qiE '^(feat|fix|perf)(\(.+\))?!?:|^[a-z]+(\(.+\))?!:|BREAKING[ -]CHANGE'; then
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "Releasable commits since ${LAST_TAG:-<root>} — releasing."
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "No feat/fix/perf/breaking commits since ${LAST_TAG:-<root>} — skipping publish."
          fi
      # release-it pushes the release commit + tag to main itself (git.push:true in
      # .release-it.json) BEFORE creating the GitHub release — so the GitHub release
      # attaches to the already-pushed tag at the correct commit. Pushing here (rather
      # than in a later step) is what keeps the tag and origin/main in sync; creating
      # the GitHub release first would mint v${version} at the wrong (pre-release) SHA.
      - name: release-it (bump, changelog, tag, push, GitHub release, publish all @stewmore/* packages)
        if: steps.decide.outputs.release == 'true'
        run: npx release-it --ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
      - name: Verify release landed on main
        if: steps.decide.outputs.release == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git fetch origin main # tags already match remote (release-it pushed them); --tags would clobber-reject
          REMOTE_VERSION=$(git show origin/main:package.json | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).version")
          REMOTE_SHA=$(git rev-parse origin/main)
          TAG_SHA=$(git rev-parse "v${VERSION}^{commit}")
          if [ "$REMOTE_VERSION" != "$VERSION" ]; then
            echo "::error::origin/main package.json is $REMOTE_VERSION, expected $VERSION. Release commit may not have been pushed — merge tag v${VERSION} onto main."
            exit 1
          fi
          if [ "$REMOTE_SHA" != "$TAG_SHA" ]; then
            echo "::error::origin/main ($REMOTE_SHA) is not at tag v${VERSION} ($TAG_SHA). Release commit may not have been pushed — merge tag v${VERSION} onto main."
            exit 1
          fi
